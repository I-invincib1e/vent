					{
						"@type": "Question",
						"name": "Is OpenVent actually self-hosted?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "The orchestration layer is self-hosted — the code, database, call logic, compliance rules, and dashboard all run on your own infrastructure. Telephony (Twilio) and the AI models (STT/LLM/TTS) remain cloud APIs by necessity, since no one self-hosts a phone network or frontier-quality model weights. OpenVent wires those providers together while you own everything above the network layer."
						}
					},
					{
						"@type": "Question",
						"name": "How is OpenVent different from Vapi or Retell?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Vapi and Retell are fully managed platforms — you configure a prompt in their dashboard with no access to the underlying code. OpenVent is open-core: you self-host the actual orchestration code, bring your own provider keys, and your call data lands directly in your own database instead of a vendor's platform."
						}
					},
					{
						"@type": "Question",
						"name": "Is OpenVent free to use?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "Yes. The self-hosted core is free forever under the Apache License 2.0 — fully open source. You pay only for the AI/telephony provider usage you bring yourself (Twilio, Deepgram, ElevenLabs, your LLM). A managed hosted tier is planned for later, but the self-hosted core will never be paywalled."
						}
					},
					{
						"@type": "Question",
						"name": "What compliance does OpenVent handle automatically?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "OpenVent enforces TCPA calling-window restrictions and Do-Not-Call list checks before every outbound call, plays a spoken AI/recording disclosure by default, includes a HIPAA boot guardrail, and runs GDPR-style data retention purge and right-to-erasure. A compliance audit-trail export can produce a per-call or per-number record for a lawyer or compliance officer on demand."
						}
					}
				]
